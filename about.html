<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="/favicon.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CBI 소개</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: #050505;
      color: #ffffff;
      line-height: 1.7;
    }

    .wrap {
      width: min(1000px, calc(100% - 40px));
      margin: 0 auto;
      padding: 60px 0;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }

    h1 {
      font-size: 42px;
      line-height: 1.2;
      margin: 0;
    }

    .text {
      margin-top: 24px;
      font-size: 17px;
      color: rgba(255,255,255,0.75);
    }

    .box {
      margin-top: 40px;
      padding: 28px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }

    .btn {
      display: inline-block;
      margin-top: 40px;
      padding: 14px 22px;
      border-radius: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #e9cf85, #caa64b);
      color: #111;
      text-decoration: none;
    }
    .btn-group {
  display: flex;
  gap: 14px;
  margin-top: 30px;
  flex-wrap: wrap;
}
    .logo img {
  height: 120px;
  width: auto;
  display: block;
  filter: brightness(1.05);
}
  </style>
</head>

<body>
  <div class="wrap">

    <a href="/" class="logo">
  <img src="/logo.png" alt="SAFEKOREA" />
</a>
    <h1>투자시민권, 왜 국가별 비교가 중요할까요?</h1>

    <div class="text">
      투자시민권(CBI)은 단순히 비용만으로 결정할 수 있는 영역이 아닙니다.
      국가별 제도 안정성, 심사 기준, 가족 포함 범위, 자산 구조, 활용 목적까지
      함께 고려해야 하는 전략적 선택입니다.
    </div>

    <div class="box">
      ✔ 국가별 투자금 및 실제 총 비용 차이<br><br>
      ✔ 가족 포함 범위 및 확장 조건<br><br>
      ✔ 심사 기간 및 승인 가능성<br><br>
      ✔ 부동산형 vs 기부형 구조 차이
    </div>

    <div class="text">
      이 페이지는 복잡한 정보를 단순히 나열하는 것이 아니라,
      실제 의사결정에 필요한 핵심 기준만 정리하여 제공합니다.
    </div>
    <div class="btn-group">
      <a href="/contact-qr.html" class="btn">상담 문의하기</a>
      <a href="/" class="btn">메인으로 돌아가기</a>  
  
</div>
