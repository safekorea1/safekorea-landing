<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="/favicon.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세이프코리아</title>
  <meta name="description" content="텔레그램 및 위챗 QR 문의 안내 페이지" />

  <style>
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: #050505;
      color: #fff;
    }

    a { text-decoration: none; color: inherit; }

    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 80px;
    }

    .topbar {
      display: flex;
      align-items: center;
      padding: 12px 0 24px;
    }

    .logo img {
      height: 120px;
      display: block;
      filter: brightness(1.05);
    }

    /* GRID */
    .grid {
      display: grid;
      gap: 24px;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    }

    /* CARD */
    .card {
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      border-radius: 28px;
      padding: 28px;
      transition: all 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.18);
    }

    .label {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    .title {
      margin-top: 10px;
      font-size: 28px;
      font-weight: 700;
    }

    .desc {
      margin-top: 12px;
      color: rgba(255,255,255,0.72);
      font-size: 15px;
      line-height: 1.7;
    }

    /* QR */
    .qr-box {
      margin-top: 22px;
      border-radius: 24px;
      background: #fff;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 280px;
    }

    .qr-box img {
      width: 100%;
      max-width: 300px;
      border-radius: 16px;
      display: block;
    }

    /* 클릭 UX */
    .qr-box a {
      display: block;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .qr-box a:hover {
      transform: scale(1.04);
    }

    /* WeChat 비활성 */
    .wechat {
      opacity: 0.6;
    }

    .wechat:hover {
      transform: none;
      border-color: rgba(255,255,255,0.08);
    }

    /* 모바일 */
    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- 로고 -->
    <div class="topbar">
      <a href="/" class="logo">
        <img src="/logo.png" alt="SAFEKOREA" />
      </a>
    </div>

    <!-- 카드 -->
    <section class="grid">

      <!-- Telegram -->
      <div class="card">
        <div class="label">Telegram</div>
        <div class="title">텔레그램 문의</div>
        <div class="desc">QR을 클릭하면 텔레그램 문의 채널로 이동합니다.</div>

        <div class="qr-box">
          <a href="https://t.me/safekorea1" target="_blank">
            <img src="/telegram-qr.jpg" alt="텔레그램 QR 코드" />
          </a>
        </div>
      </div>

      <!-- WeChat -->
      <div class="card wechat">
        <div class="label">WeChat</div>
        <div class="title">위챗 문의</div>
        <div class="desc">곧 지원 예정입니다.</div>

        <div class="qr-box">
          <img src="/wechat-qr.jpg" alt="위챗 QR 코드" />
        </div>
      </div>

    </section>

  </div>
</body>
</html>
