<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국가 안내 | 세이프코리아</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    .container {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    .header {
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      z-index: 100;
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
    }

    .nav {
      display: flex;
      gap: 20px;
    }

    .section {
      padding: 100px 0;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-top: 40px;
    }

    .card {
      background: rgba(20,20,20,0.7);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      transition: 0.25s;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(212,175,55,0.4);
    }

    .card img {
      width: 100%;
      border-radius: 14px;
      margin-bottom: 14px;
    }

    .btn {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 16px;
      border-radius: 12px;
      background: linear-gradient(135deg, #e9cf85, #caa64b);
      color: #111;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header class="header">
  <div class="container header-inner">
    <a href="/">SAFEKOREA</a>
    <nav class="nav">
      <a href="/">홈</a>
      <a href="/countries.html">국가안내</a>
      <a href="/contact-qr.html">문의</a>
    </nav>
  </div>
</header>

<section class="section">
  <div class="container">
    <h1>국가 안내</h1>
    <p>각 국가별 투자시민권 특징을 확인하세요.</p>

    <div class="cards">

      <div class="card">
        <img src="/tk.png" />
        <h3>터키</h3>
        <p>대표적인 투자시민권 프로그램</p>
        <a class="btn" href="/countries.html">문의하기</a>
      </div>

      <div class="card">
        <img src="/vanuatu.jpg" />
        <h3>바누아투</h3>
        <p>빠르고 간결한 진행 구조</p>
        <a class="btn" href="/countries.html">문의하기</a>
      </div>

      <div class="card">
        <img src="/grenada.jpg" />
        <h3>그레나다</h3>
        <p>특정 국가 연계 활용 가능</p>
        <a class="btn" href="/countries.html">문의하기</a>
      </div>

    </div>
  </div>
</section>

</body>
</html>
