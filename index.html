<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="/favicon.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세이프코리아</title>

  <style>
    :root {
      --gold-line: rgba(212,175,55,0.35);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: #000000;
      color: #ffffff;
      line-height: 1.6;
      word-break: keep-all;
      overflow-x: hidden;
      position: relative;
    }

    /* 🔥 배경 영상 */
    .video-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      background: #000;
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.45),
        rgba(0,0,0,0.65)
      );
    }

    /* 🔥 콘텐츠를 영상 위로 */
    .header,
    .section,
    .footer {
      position: relative;
      z-index: 10;
    }

    img { max-width: 100%; }

    .container {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    .header {
      backdrop-filter: blur(10px);
      background: rgba(10,10,10,0.7);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      padding: 16px 0;
    }

    .logo img {
      width: clamp(140px, 16vw, 220px);
    }

    .nav {
      display: flex;
      gap: 20px;
    }

    .section {
      padding: 88px 0;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 40px;
      align-items: center;
    }

    h1 {
      font-size: clamp(34px, 6vw, 56px);
    }

    .hero-text {
      margin-top: 20px;
      opacity: 0.8;
    }

    .button-row {
      margin-top: 30px;
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 14px 22px;
      border-radius: 14px;
    }

    .btn-primary {
      background: gold;
      color: black;
    }

    .panel {
      background: rgba(0,0,0,0.6);
      border-radius: 20px;
      padding: 30px;
    }

    @media (max-width: 900px) {
      .hero-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <!-- 🔥 배경 영상 -->
  <div class="video-bg">
    <video autoplay muted loop playsinline>
      <source src="/bg-video.mp4" type="video/mp4">
    </video>
  </div>
  <div class="video-overlay"></div>

  <!-- 기존 그대로 -->
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <img src="/logo.png" />
      </a>
      <nav class="nav">
        <a href="#">소개</a>
        <a href="#">국가안내</a>
        <a href="#">후기</a>
        <a href="#">문의</a>
      </nav>
    </div>
  </header>

  <section class="section">
    <div class="container hero-grid">
      <div>
        <h1>글로벌 투자시민권</h1>
        <p class="hero-text">신중하게 선택하세요</p>
        <div class="button-row">
          <a class="btn btn-primary">상담 문의</a>
        </div>
      </div>

      <div class="panel">
        Global Strategy
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">© 2026</div>
  </footer>

</body>
</html>
