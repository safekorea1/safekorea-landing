<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="icon" href="/favicon.png" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세이프코리아</title>

  <style>
    :root {
      --gold-line: rgba(212,175,55,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    /* 🎥 배경 영상 */
    .video-bg-wrap {
      position: fixed;
      inset: 0;
      z-index: -3;
      overflow: hidden;
    }

    .video-bg {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }

    /* 🧊 헤더 */
    .header {
      position: relative;
      z-index: 100;
      backdrop-filter: blur(10px);
      background: transparent; /* 🔥 핵심 */
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
    }

    .nav {
      display: flex;
      gap: 22px;
      margin-left: auto;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    /* 🔥 핵심: 첫 섹션 투명 */
    .hero {
      background: transparent;
    }

    .section {
      padding: 88px 0;
      background: rgba(0,0,0,0.18);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 40px;
      align-items: center;
    }

    h1 {
      font-size: 48px;
      line-height: 1.2;
      margin: 0;
    }

    .hero-text {
      margin-top: 20px;
      color: rgba(255,255,255,0.7);
    }

    .button-row {
      margin-top: 30px;
      display: flex;
      gap: 14px;
    }

    .btn {
      padding: 14px 22px;
      border-radius: 18px;
      font-weight: 700;
    }

    .btn-primary {
      background: linear-gradient(135deg, #e9cf85, #caa64b);
      color: #111;
    }

    .panel {
      background: rgba(10,10,10,0.7);
      border-radius: 24px;
      padding: 30px;
      backdrop-filter: blur(6px);
    }

    .check-item {
      margin-top: 10px;
      padding: 12px;
      border: 1px solid rgba(212,175,55,0.35);
      border-radius: 12px;
    }
  </style>
</head>

<body>

<!-- 🎥 영상 -->
<div class="video-bg-wrap">
  <video class="video-bg" autoplay muted loop playsinline>
    <source src="/bg-video.mp4" type="video/mp4">
  </video>
  <div class="video-bg-overlay"></div>
</div>

<!-- 🧊 헤더 -->
<header class="header">
  <div class="container header-inner">
    <a href="/" class="logo">
      <img src="/logo.png" style="height:60px;">
    </a>

    <nav class="nav">
      <a href="/about.html">소개</a>
      <a href="/countries.html">국가안내</a>
      <a href="#reviews">후기</a>
      <a href="/contact-qr.html">문의</a>
    </nav>
  </div>
</header>

<!-- 🔥 HERO -->
<section class="section hero">
  <div class="container hero-grid">
    <div>
      <h1>
        글로벌 투자시민권,<br>
        더 신중하고 전략적으로<br>
        선택하세요.
      </h1>

      <p class="hero-text">
        국가별 투자시민권 핵심 기준만 선별해 안내합니다.
      </p>

      <div class="button-row">
        <a class="btn btn-primary" href="/contact-qr.html">상담 문의하기</a>
        <a class="btn btn-primary" href="/countries.html">국가별 정보 보기</a>
      </div>
    </div>

    <div class="panel">
      <h3>Global CBI Strategy</h3>
      <p>국가별 조건 비교 및 전략 안내</p>

      <div class="check-item">국가별 조건 비교</div>
      <div class="check-item">가족 포함 범위 검토</div>
      <div class="check-item">맞춤형 진행 방향 안내</div>
    </div>
  </div>
</section>

</body>
</html>
